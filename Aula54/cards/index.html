<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Painel de Cards</title>
</head>

<body>
    <div class="container">
        <div class="card"><i class="fa-solid fa-chalkboard-user"></i> Card 1 <br>Intrutores capacitados</div>
        <div class="card"><i class="fa-brands fa-dev"></i> Card 2 <br>Desenvolvimento de habilidades</div>
        <div class="card"><i class="fa-solid fa-money-bill-1-wave"></i> Card 3 <br>Preços acessíveis</div>
        <div class="card"><i class="fa-solid fa-school-flag"></i> Card 4 <br>Aplendizado dinâmico</div>
        <div class="card"><i class="fa-regular fa-circle-question"></i> Card 5 <br>Suporte contínuo</div>
        <div class="card"><i class="fa-solid fa-award"></i> Card 6 <br>Certificação reconhecida</div>
    </div>
</body>

</html>
